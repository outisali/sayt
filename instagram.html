<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Instagram Login</title>
<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:white;
    padding:40px;
    border:1px solid #dbdbdb;
    text-align:center;
}

.logo{
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.title{
    font-size:18px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #dbdbdb;
    border-radius:8px;
    background:#fafafa;
}

.login-btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#4c8bf5;
    border:none;
    border-radius:20px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.forgot{
    margin:15px 0;
    font-size:14px;
    color:#385185;
}

.fb-btn{
    width:100%;
    padding:10px;
    border:1px solid #dbdbdb;
    border-radius:20px;
    background:white;
    cursor:pointer;
}

.signup{
    margin-top:15px;
    padding:10px;
    border:1px solid #4c8bf5;
    border-radius:20px;
    color:#4c8bf5;
    cursor:pointer;
}

.meta{
    margin-top:20px;
    color:#999;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">Instagram</div>

<div class="title">Войти в Instagram</div>

<input type="text" placeholder="Имя пользователя, телефон или email">

<input type="password" placeholder="Пароль">

<button class="login-btn">Войти</button>

<div class="forgot">Забыли пароль?</div>

<button class="fb-btn">Войти через Facebook</button>

<div class="signup">Создать новый аккаунт</div>

<div class="meta">Meta</div>

</div>

</body>
</html>
