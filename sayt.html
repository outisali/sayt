        /* 1. Umumiy sozlamalar */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f; /* To'q rangli fon */
            color: white;
            overflow-x: hidden; /* O'ngdan uchib kirganda polosa chiqmasligi uchun */
        }

        /* 2. Animatsiya: O'ngdan chapga uchib kirish */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .animated {
            animation: slideIn 0.8s ease-out forwards;
        }

        /* 3. Header va Ijtimoiy tarmoqlar */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(36, 12, 59, 0.178);
        }

        .company-name {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #030418;
            text-transform: uppercase;
        }

        .social-group {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            text-decoration: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px; /* Yumaloq chetlar */
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        /* Ranglar */
        .tg { background-color: #0088cc; } /* Ko'k */
        .inst { background-color: #e1306c; } /* Pushti */
        .yt { background-color: #ff0000; } /* Qizil */

        .social-btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
        }

        /* 4. Asosiy qism: Sidebar va Files */
        .main-layout {
            display: flex;
            padding: 30px;
        }

        .sidebar {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-btn {
            background: #1e1e1e;
            color: white;
            border: 2px solid #333;
            padding: 15px;
            border-radius: 15px; /* Yumaloq */
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-btn:hover {
            border-color: #00d4ff;
            background: #252525;
        }

        .file-btn i {
            margin-right: 10px;
            color: #00d4ff;
        }
    </style>
</head>

        <div class="social-group">

            <a href="#" class="social-btn inst"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="#" class="social-btn yt"><i class="fab fa-youtube"></i> YouTube</a>
        </div>
    </header>

    <div class="main-layout">
        <div class="sidebar animated" style="animation-delay: 0.2s;">
            <div class="file-btn"><i class="fas fa-file-code"></i> File 1</div>

            <div class="file-btn"><i class="fas fa-file-code"></i> File 5</div>

        <div class="content animated" style="animation-delay: 0.4s; padding-left: 50px;">
            <h2>OUTIS COMPANY</h2>
            <p>welcome the future awaits you.</p>
        </div>
    </div>

</body>
